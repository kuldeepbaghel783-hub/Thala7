<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Payment</title>

   <style>

    /* =====================
   PAYMENT PAGE
===================== */

.checkout{
    display:flex;
    gap:40px;
    padding:60px 8%;
}

.checkout-left{
    flex:2;
}

.checkout-right{
    flex:1;
}

/* LEFT SECTION */

.checkout-left h1{
    margin-bottom:30px;
    font-size:40px;
}

.checkout-left form{
    display:flex;
    flex-direction:column;
}

.checkout-left label{
    margin-bottom:8px;
    font-weight:600;
}

.checkout-left input,
.checkout-left textarea{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

.checkout-left textarea{
    resize:none;
    height:120px;
}

.row{
    display:flex;
    gap:20px;
}

.row div{
    flex:1;
}

/* RIGHT SECTION */

.checkout-right{
    background:#f7f7f7;
    padding:30px;
    border-radius:12px;
    height:fit-content;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.checkout-right h2{
    margin-bottom:25px;
}

.summary p{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.summary h3{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    font-size:24px;
}

.pay-btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:8px;
    background:orange;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn:hover{
    background:#222;
}

/* =====================
   TABLET
===================== */

@media(max-width:992px){

    .checkout{
        flex-direction:column;
    }

    .checkout-right{
        width:100%;
    }

}

/* =====================
   MOBILE
===================== */

@media(max-width:768px){

    .checkout{
        padding:40px 5%;
    }

    .row{
        flex-direction:column;
        gap:0;
    }

    .checkout-left h1{
        font-size:30px;
    }

}

/* =====================
   SMALL MOBILE
===================== */

@media(max-width:480px){

    .checkout-left h1{
        font-size:24px;
    }

    .checkout-right h2{
        font-size:22px;
    }

    .summary h3{
        font-size:20px;
    }

}




   </style>
</head>
<body>



<section class="checkout">

    <!-- LEFT SIDE -->

    <div class="checkout-left">

        <h1>Checkout</h1>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter Full Name">

            <label>Email Address</label>
            <input type="email" placeholder="Enter Email">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter Phone Number">

            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456">

            <div class="row">

                <div>
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY">
                </div>

                <div>
                    <label>CVV</label>
                    <input type="password" placeholder="***">
                </div>

            </div>

            <label>Billing Address</label>
            <textarea placeholder="Enter Address"></textarea>

        </form>

    </div>

    <!-- RIGHT SIDE -->

    <div class="checkout-right">

        <h2>Order Summary</h2>

        <div class="summary">

            <p>
                <span>Product</span>
                <span>₹1999</span>
            </p>

            <p>
                <span>Shipping</span>
                <span>₹100</span>
            </p>

            <p>
                <span>Tax</span>
                <span>₹50</span>
            </p>

            <hr>

            <h3>
                <span>Total</span>
                <span>₹2149</span>
            </h3>

        </div>

        <button class="pay-btn">
            Pay Now
        </button>

    </div>

</section>

</body>
</html>
