<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:white;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logo span{
    color:orange;
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.icons{
    display:flex;
    align-items:center;
    gap:20px;
}

.icons img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

.icons i{
    cursor:pointer;
}



    /* =========================
   CART PAGE
========================= */

.cart-page{
    display:flex;
    justify-content:space-between;
    gap:40px;
    padding:60px 8%;
}

.cart-left{
    flex:2;
}

.cart-left h1{
    margin-bottom:25px;
    font-size:40px;
}

.cart-left table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

.cart-left table th{
    background:#222;
    color:#fff;
    padding:15px;
    text-align:center;
}

.cart-left table td{
    padding:15px;
    text-align:center;
    border:1px solid #ddd;
}

.cart-left table tr:hover{
    background:#f5f5f5;
}

.cart-right{
    flex:1;
    background:#f7f7f7;
    padding:30px;
    border-radius:12px;
    height:fit-content;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.cart-right h2{
    margin-bottom:25px;
}

.cart-right p{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-size:18px;
}

.cart-right h3{
    margin-top:20px;
    padding-top:20px;
    border-top:2px solid #ddd;
    font-size:24px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 25px;
    background:orange;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:#222;
}

.coupon-box{
    margin-top:20px;
}

.coupon-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:10px;
}

.coupon-box button{
    width:100%;
    padding:12px;
    border:none;
    background:#222;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.coupon-box button:hover{
    background:orange;
}

/* =========================
   TABLET
========================= */

@media(max-width:992px){

    .cart-page{
        flex-direction:column;
    }

    .cart-right{
        width:100%;
    }

}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .cart-page{
        padding:40px 5%;
    }

    .cart-left h1{
        font-size:30px;
    }

    .cart-left{
        overflow-x:auto;
    }

    table{
        min-width:600px;
    }

    .btn{
        width:100%;
        text-align:center;
    }

}

/* =========================
   SMALL MOBILE
========================= */

@media(max-width:480px){

    .cart-left h1{
        font-size:24px;
    }

    .cart-right h2{
        font-size:22px;
    }

    .cart-right h3{
        font-size:20px;
    }

}

    </style>


</head>
<body>

<header>

    <div class="logo">
        <span>Thala</span> 7.
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="product.html">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

</header>

<section class="cart-page">

    <div class="cart-left">

        <h1>Shopping Cart</h1>

        <table>

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>

            <tr>
                <td>Premium Running Shoe</td>
                <td>₹1999</td>
                <td>1</td>
                <td>₹1999</td>
            </tr>

        </table>

        <a href="product.html" class="btn">
            Continue Shopping
        </a>

    </div>

    <div class="cart-right">

        <h2>Cart Summary</h2>

        <p>Subtotal : ₹1999</p>

        <p>Shipping : ₹100</p>

        <h3>Total : ₹2099</h3>

        <a href="payment.html" class="btn">
            Proceed To Checkout
        </a>

    </div>

</section>

</body>
</html>
