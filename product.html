<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:100%;
    overflow-x:hidden;
}

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:white;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logo span{
    color:orange;
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.icons{
    display:flex;
    align-items:center;
    gap:20px;
}

.icons img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

.icons i{
    cursor:pointer;
}

/* PRODUCT */

.product{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:60px;

    padding:60px 8%;
}

.product-image{
    flex:1;
}

.product-image img{
    width:100%;
    background:#f4f4f4;
    border-radius:15px;
    padding:20px;
}

.product-details{
    flex:1;
}

.product-details h1{
    font-size:45px;
    margin-bottom:20px;
}

.product-details p{
    color:#666;
    line-height:1.8;
    margin-bottom:25px;
}

.price-section{
    display:flex;
    align-items:center;
    gap:20px;

    margin-bottom:30px;
}

.price-section h2{
    color:#0047ff;
    font-size:40px;
}

.price-section span{
    color:green;
    font-weight:bold;
}

.quantity{
    display:flex;
    align-items:center;
    gap:20px;

    margin-bottom:30px;
}

.quantity button{
    width:45px;
    height:45px;

    border:none;
    background:#f1f1f1;

    cursor:pointer;

    font-size:20px;
}

.cart-btn{
    padding:16px 35px;
    border:none;
    background:orange;
    color:white;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

/* GALLERY */

.gallery{
    display:flex;
    gap:20px;

    overflow-x:auto;

    padding:30px 8%;
}

.thumb{
    min-width:180px;
}

.thumb img{
    width:100%;
    border-radius:10px;
    background:#f4f4f4;
    padding:10px;
}

/* TABLET */

@media(max-width:992px){

    .product{
        flex-direction:column;
    }

    .product-details{
        text-align:center;
    }

    .price-section{
        justify-content:center;
    }

    .quantity{
        justify-content:center;
    }
}

/* MOBILE */

@media(max-width:768px){

    header{
        flex-direction:column;
        gap:20px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
    }

    .product-details h1{
        font-size:35px;
    }

    .price-section h2{
        font-size:30px;
    }
}

@media(max-width:480px){

    .product{
        padding:40px 5%;
    }

    .product-details h1{
        font-size:28px;
    }

    .cart-btn{
        width:100%;
    }
}
</style>


</head>

<body>

<!-- HEADER -->

<header>

    <div class="logo">
        <span>Thala</span> 7.
    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="#">About</a>
        <a href="#">Brands</a>
        <a href="#">More</a>
        <a href="#">Contact</a>

    </nav>

    <div class="icons">

        <i class="fa-solid fa-magnifying-glass"></i>

        <i class="fa-solid fa-cart-shopping"></i>

        <img src="images/profile.png" alt="profile">

    </div>

</header>

<!-- PRODUCT SECTION -->

<section class="product">

    <!-- LEFT -->

    <div class="product-image">

        <!-- ADD YOUR OWN IMAGE -->

        <img src="images/shoes.jpg" alt="shoes">

    </div>

    <!-- RIGHT -->

    <div class="product-details">

        <h1>
            Premium Running Shoes
        </h1>

        <p>
            Experience comfort, durability and
            performance with our premium running
            shoes. Perfect for daily wear and sports.
        </p>

        <div class="price-section">

            <h2>₹1,999</h2>

            <span>Save 20%</span>

        </div>

        <div class="quantity">

            <button>-</button>

            <span>1</span>

            <button>+</button>

        </div>

  <a href="cart.html" class="cart-btn">
    Add To Cart
</a>

    </div>

</section>

<!-- GALLERY -->

<section class="gallery">

    <div class="thumb">
        <img src="images/Thumb1.png" alt="">
    </div>

    <div class="thumb">
        <img src="images/Thumb2.png" alt="">
    </div>

    <div class="thumb">
        <img src="images/Thumb3.png" alt="">
    </div>

    <div class="thumb">
        <img src="images/Thumb4.png" alt="">
    </div>

    <div class="thumb">
        <img src="images/Thumb5.png" alt="">
    </div>

</section>

</body>
</html>
