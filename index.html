<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thala 7 Store</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->

<header>

    <div class="logo">
        <span>Thala</span> 7.
    </div>

    <nav>

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Brands</a>
        <a href="#">More</a>
        <a href="#">Contact</a>

    </nav>

    <div class="icons">

        <i class="fa-solid fa-magnifying-glass"></i>

        <i class="fa-solid fa-cart-shopping"></i>

        <img src="images/profile.png" alt="profile">

    </div>

</header>

<!-- HERO SECTION -->

<section class="hero">

    <div class="left">

    <h4>SEVEN</h4>

    <h1>
        7!! Thala For <br>
        a <span>Reason!</span>
    </h1>

    <p>
        Premium quality running shoes designed
        for comfort, style and performance.
    </p>

    <a href="product.html" class="shop-btn">
        Shop Now
    </a>

</div>

    <div class="right">

        <!-- ADD YOUR OWN SHOE IMAGE -->

        <img src="images/shoe.jpg" alt="shoe">

    </div>

</section>

<!-- SERVICE SECTION -->

<section class="services">

    <div class="service-box">
        <h2>2K+</h2>
        <p>Reviews</p>
    </div>

    <div class="service-box">
        <h2>30K+</h2>
        <p>Customers</p>
    </div>

    <div class="service-box">
        <h2>4.5/5</h2>
        <p>Rating</p>
    </div>

    <div class="service-box">
        <h2>High</h2>
        <p>Quality</p>
    </div>

</section>

</body>
</html>
